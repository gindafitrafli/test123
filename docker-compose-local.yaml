name: test123
services:

  client-facing:
    build:
      context: ./clientfacing
      dockerfile: Dockerfile
    container_name: client-facing
    depends_on:
      - client-facing-db
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_DATASOURCE_PASSWORD=client_db_password
      - SPRING_DATASOURCE_USERNAME=client_db
      - SPRING_DATASOURCE_URL=jdbc:postgresql://client-facing-db:5432/client_db
      - SPRING_DATA_JDBC_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop

    ports:
      - "8080:8080"

