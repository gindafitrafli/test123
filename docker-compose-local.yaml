  client-facing-db:
    image: postgres
    container_name: client-facing-db
    environment:
      - POSTGRES_USER=client_db
      - POSTGRES_PASSWORD=client_db_password
      - POSTGRES_DB=client_db
    ports:
      - "5432:5432"

